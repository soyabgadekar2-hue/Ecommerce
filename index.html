<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecommerce MVP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero py-5 mb-4">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-7 text-center text-lg-start">
          <span class="badge bg-white text-dark mb-3">Ecommerce MVP</span>
          <h1 class="display-5 fw-bold">Shop modern essentials with mock checkout flow.</h1>
          <p class="lead text-white-75">Browse products, filter by category, search and add items to your cart. This demo uses frontend JSON data only.</p>
          <div class="d-flex justify-content-center justify-content-lg-start gap-2">
            <button class="btn btn-primary btn-lg" type="button" onclick="document.getElementById('productSection').scrollIntoView({ behavior: 'smooth' })">Browse Products</button>
            <button class="btn btn-outline-light btn-lg" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartCanvas" aria-controls="cartCanvas">View Cart <span class="badge bg-light text-dark" id="cartCount">0</span></button>
          </div>
        </div>
        <div class="col-lg-5 text-center mt-4 mt-lg-0">
          <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=760&q=80" class="img-fluid rounded shadow-lg" alt="Shopping illustration" />
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="mb-4">
      <div class="row align-items-center gy-3">
        <div class="col-md-6">
          <input id="searchInput" type="search" class="form-control" placeholder="Search products, apparel, footwear..." aria-label="Search products" />
        </div>
        <div class="col-md-3">
          <select id="sortSelect" class="form-select" aria-label="Sort products">
            <option value="default">Sort by default</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
          </select>
        </div>
        <div class="col-md-3 text-md-end">
          <button class="btn btn-outline-secondary" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartCanvas" aria-controls="cartCanvas">
            Cart <span class="badge bg-secondary" id="cartCount">0</span>
          </button>
        </div>
      </div>
    </section>

    <section class="mb-4">
      <div id="categoryList" class="d-flex flex-wrap gap-2"></div>
    </section>

    <section id="productSection" class="mb-4">
      <div id="productGrid" class="row"></div>
    </section>
  </main>

  <div class="offcanvas offcanvas-end" tabindex="-1" id="cartCanvas" aria-labelledby="cartCanvasLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="cartCanvasLabel">Shopping Cart</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      <div id="cartItems"></div>
      <div class="mt-4 border-top pt-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="fw-semibold">Subtotal</span>
          <span id="cartTotal">$0.00</span>
        </div>
        <button class="btn btn-primary w-100" type="button" onclick="showCartToast('Checkout is not available in this demo.')">Proceed to Checkout</button>
      </div>
    </div>
  </div>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="cartToast" class="toast align-items-center text-bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="cartToastBody">Added to cart</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
